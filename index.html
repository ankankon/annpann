<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>DEATH MAZE - COMPLETE EDITION</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu">
    <h1 id="menu-title">DEATH MAZE</h1>
    <p id="menu-text">操作モードを選択してください</p>
    
    <div id="best-time-display">BEST TIME: --.--s</div>
    
    <div class="btn-container">
      <button class="start-btn" onclick="startGame('pc')">PC モード<br><span>(マウス視点 / WASD移動)</span></button>
      <button class="start-btn" onclick="startGame('mobile')">スマホ モード<br><span>(左右画面タッチ操作)</span></button>
    </div>

    <a href="homepage.html" target="_blank" id="home-link">OFFICIAL HOME PAGE</a>
  </div>

  <div id="pause-menu">
    <h2>PAUSE</h2>
    <div class="pause-btn-container">
      <button class="menu-btn p-idx" onclick="resumeGame()">ゲームに戻る</button>
      <button class="menu-btn p-idx" onclick="retryGame()">リトライ</button>
      <button class="menu-btn p-idx" onclick="backToMainMenu()">メインメニュー</button>
    </div>
    <p class="help-text">【Key】↑ / ↓ (W / S) : 選択 | Enter : 決定</p>
  </div>

  <button id="ingame-menu-btn" onclick="openPauseMenu()">MENU</button>

  <div id="timer-display">TIME: 0.00s</div>
  <div id="info"></div>

  <div id="touch-container">
    <div id="left-zone" class="touch-zone">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>
    <div id="right-zone" class="touch-zone"></div>
  </div>

  <canvas id="game"></canvas>

  <script src="script.js"></script>
</body>
</html>
